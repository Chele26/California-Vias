<!-- i18n: auto language detection + manual toggle -->
<script>
(function() {
  /* ── TRANSLATIONS ──────────────────────────────────────────── */
  const translations = {
    en: {
      'nav.about':        'About',
      'nav.aboutFull':    'About Laura',
      'nav.properties':   'Properties',
      'nav.sold':         'Sold',
      'nav.services':     'Services',
      'nav.contact':      'Contact',

      /* Property page labels — used by property.js via window.i18n */
      'prop.backBtn':       '← Back to Properties',
      'prop.overview':      'Property Overview',
      'prop.beds':          'Beds',
      'prop.baths':         'Baths',
      'prop.sqft':          'Sq Ft',
      'prop.garage':        'Garage',
      'prop.yearBuilt':     'Year Built',
      'prop.lotSize':       'Lot Size',
      'prop.status':        'Status',
      'prop.features':      '✦ Features & Highlights',
      'prop.description':   '✦ About This Property',
      'prop.contact':       'Interested in This Property?',
      'prop.contactSub':    'Contact Laura for more information or to schedule a showing.',
      'prop.callBtn':       'Call Laura',
      'prop.msgBtn':        'Send a Message',
      'prop.gallery':       'Photo Gallery',
      'prop.available':     'Available',
      'prop.sold':          'Sold',
      'prop.pending':       'Pending',

      'footer.copy': '© 2026 Tu Casa con Laura. All Rights Reserved.',
      'footer.made': 'Designed for a refined property experience.',
    },
    es: {
      'nav.about':        'Acerca',
      'nav.aboutFull':    'Acerca de Laura',
      'nav.properties':   'Propiedades',
      'nav.sold':         'Vendidas',
      'nav.services':     'Servicios',
      'nav.contact':      'Contacto',

      /* Property page labels */
      'prop.backBtn':       '← Volver a Propiedades',
      'prop.overview':      'Resumen de la Propiedad',
      'prop.beds':          'Rec.',
      'prop.baths':         'Baños',
      'prop.sqft':          'Pies²',
      'prop.garage':        'Garage',
      'prop.yearBuilt':     'Año de Construcción',
      'prop.lotSize':       'Tamaño del Lote',
      'prop.status':        'Estado',
      'prop.features':      '✦ Características Destacadas',
      'prop.description':   '✦ Acerca de Esta Propiedad',
      'prop.contact':       '¿Interesado en Esta Propiedad?',
      'prop.contactSub':    'Contáctame para obtener más información o programar una visita.',
      'prop.callBtn':       'Llamar a Laura',
      'prop.msgBtn':        'Enviar un Mensaje',
      'prop.gallery':       'Galería de Fotos',
      'prop.available':     'Disponible',
      'prop.sold':          'Vendida',
      'prop.pending':       'Pendiente',

      'footer.copy': '© 2026 Tu Casa con Laura. Todos los Derechos Reservados.',
      'footer.made': 'Diseñado para una experiencia inmobiliaria refinada.',
    }
  };

  /* ── APPLY TRANSLATIONS ────────────────────────────────────── */
  function applyLang(lang) {
    const t = translations[lang] || translations.en;
    document.documentElement.lang = lang;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });

    const lbl = document.getElementById('langLabel');
    if (lbl) lbl.textContent = lang === 'en' ? 'ES' : 'EN';

    document.title = lang === 'es'
      ? 'Detalles de Propiedad | Tu Casa con Laura'
      : 'Property Details | Tu Casa con Laura';

    localStorage.setItem('tcl-lang', lang);
    window.__currentLang = lang;

    /* Expose translations for property.js to use */
    window.i18n = t;
    window.i18nLang = lang;

    /* If property content is already rendered, re-translate labels */
    if (typeof window.reApplyPropLabels === 'function') {
      window.reApplyPropLabels();
    }
  }

  /* ── DETECT LANGUAGE ───────────────────────────────────────── */
  function detectLang() {
    const saved = localStorage.getItem('tcl-lang');
    if (saved && translations[saved]) return saved;
    const browser = (navigator.language || 'en').toLowerCase();
    return browser.startsWith('es') ? 'es' : 'en';
  }

  /* ── TOGGLE ────────────────────────────────────────────────── */
  function initToggle() {
    const btn = document.getElementById('langToggle');
    if (!btn) return;
    btn.addEventListener('click', () => {
      applyLang(window.__currentLang === 'en' ? 'es' : 'en');
    });
  }

  /* ── INIT ──────────────────────────────────────────────────── */
  applyLang(detectLang());
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initToggle);
  } else {
    initToggle();
  }
})();
</script>

<!-- Lang toggle + property label styles -->
<style>
  .lang-toggle {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: .65rem;
    font-weight: 500;
    letter-spacing: .12em;
    padding: .28rem .65rem;
    cursor: pointer;
    transition: background .25s, color .25s;
    border-radius: 2px;
  }
  .lang-toggle:hover {
    background: var(--gold);
    color: var(--bk);
  }
</style>
